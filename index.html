<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRCS (SN) Revision</title>
<style>
:root{--navy:#1e3a5f;--teal:#0891b2;--green:#059669;--amber:#d97706;--red:#dc2626;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g400:#9ca3af;--g600:#4b5563;--g800:#1f2937;--sh:0 1px 3px rgba(0,0,0,.1);--shm:0 4px 12px rgba(0,0,0,.08);--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
/* HEADER */
header{background:var(--navy);color:#fff;padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px}
.hdr-title{font-size:1.1rem;font-weight:700;white-space:nowrap}.hdr-title span{color:#38bdf8}
.hdr-stats{display:flex;gap:20px;align-items:center}
.stat{text-align:center}.stat-val{font-size:1.3rem;font-weight:700;color:#38bdf8;line-height:1}.stat-lbl{font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:.05em}
.hdr-bot{display:flex;align-items:center;gap:16px;font-size:.8rem;opacity:.75;flex-wrap:wrap}
.exam-inp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:3px 8px;border-radius:4px;font-size:.8rem}
.ovr-bar{background:rgba(255,255,255,.15);border-radius:100px;height:5px;margin-top:10px;overflow:hidden}
.ovr-fill{background:#38bdf8;height:100%;border-radius:100px;transition:width .4s}
/* TABS */
nav.tabs{display:flex;background:#fff;border-bottom:2px solid var(--g200);padding:0 24px;position:sticky;top:110px;z-index:90;overflow-x:auto}
.tab-btn{padding:11px 18px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--g600);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-btn:hover:not(.active){color:var(--g800);background:var(--g50)}
.global-source-filter{display:flex;align-items:center;gap:0;margin-left:auto;padding:4px;background:var(--g100);border-radius:6px;flex-shrink:0}
.gsf-btn{padding:5px 12px;border:none;background:none;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--g600);border-radius:4px;transition:all .15s;white-space:nowrap}
.gsf-btn.active[data-gsf="all"]{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gsf-btn.active[data-gsf="korky"]{background:#fef08a;color:#713f12;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gsf-btn.active[data-gsf="web"]{background:#dbeafe;color:#1e40af;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gsf-btn.active[data-gsf="recall"]{background:#dcfce7;color:#166534;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.gsf-btn:hover:not(.active){background:rgba(255,255,255,.6)}
main{max-width:1400px;margin:0 auto;padding:24px}
.tab-panel{display:none}.tab-panel.active{display:block}
/* SOURCES */
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-bar input[type=text]{flex:1;min-width:180px;padding:8px 14px;border:1px solid var(--g200);border-radius:var(--r);font-size:.88rem}
.filter-bar select{padding:8px 10px;border:1px solid var(--g200);border-radius:var(--r);font-size:.88rem;background:#fff}
.sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.src-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);display:flex;flex-direction:column;transition:box-shadow .15s,opacity .2s}
.src-card:hover{box-shadow:var(--shm)}.src-card.disabled{opacity:.45}
.src-card-hd{padding:13px 15px 9px;border-bottom:1px solid var(--g100)}
.src-title{font-size:.88rem;font-weight:600;line-height:1.4;margin-bottom:6px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.b-essential{background:#fee2e2;color:#991b1b}.b-recommended{background:#fef3c7;color:#92400e}.b-supplementary{background:var(--g100);color:var(--g600)}
.b-korky{background:#fef08a;color:#713f12;border:1px solid #eab308}
.korky-pill{display:inline-flex;align-items:center;gap:4px;background:#fef08a;color:#713f12;padding:2px 8px;border-radius:100px;font-size:.68rem;font-weight:700;border:1px solid #eab308;white-space:nowrap}
.korky-toggle-bar{display:flex;align-items:center;gap:10px;background:#fefce8;border:1px solid #fde047;border-radius:var(--r);padding:9px 14px;margin-bottom:14px;font-size:.83rem;color:#713f12;font-weight:600}
.korky-toggle-bar .tog-track{background:#fde047}.korky-toggle-bar input:checked+.tog-track{background:#ca8a04}
.btn-korky{background:#ca8a04;color:#fff}
.btn-korky.active{background:#713f12}
.b-cat{background:#dbeafe;color:#1e40af}.b-free,.b-free_pdf{background:#d1fae5;color:#065f46}.b-subscription{background:#ede9fe;color:#5b21b6}.b-purchase,.b-paid_event{background:#ffe4e6;color:#9f1239}
.src-card-bd{padding:9px 15px;flex:1}
.src-notes{font-size:.78rem;color:var(--g600);line-height:1.5;margin-bottom:7px}
.src-url{font-size:.73rem;color:var(--teal);text-decoration:none;word-break:break-all}.src-url:hover{text-decoration:underline}
.src-card-ft{padding:9px 15px;border-top:1px solid var(--g100);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tog-wrap{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--g600)}
.tog{position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0}
.tog input{display:none}.tog-track{position:absolute;inset:0;background:var(--g200);border-radius:100px;transition:background .2s}.tog input:checked+.tog-track{background:var(--teal)}
.tog-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}.tog input:checked~.tog-thumb{transform:translateX(16px)}
.status-sel{flex:1;padding:5px 7px;border:1px solid var(--g200);border-radius:4px;font-size:.78rem;background:#fff}
.status-sel.s-ip{border-color:#f59e0b;background:#fffbeb}.status-sel.s-done{border-color:var(--green);background:#f0fdf4;color:#065f46}
/* TOPICS */
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.topic-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);padding:15px}
.topic-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.topic-name{font-size:.9rem;font-weight:600;line-height:1.4}
.sec-badge{font-size:.65rem;padding:2px 6px;border-radius:100px;font-weight:700;white-space:nowrap;flex-shrink:0}
.sec-1{background:#dbeafe;color:#1e40af}.sec-2{background:#ede9fe;color:#5b21b6}.sec-b{background:#dcfce7;color:#166534}
.stars{display:flex;gap:2px;margin-bottom:6px}
.star{font-size:1.25rem;cursor:pointer;color:var(--g200);transition:color .1s,transform .1s;user-select:none;line-height:1}
.star.on{color:#f59e0b}.star:hover{transform:scale(1.2)}
.conf-lbl{font-size:.72rem;color:var(--g400);margin-bottom:8px;min-height:16px}
.topic-prog-bar{height:4px;background:var(--g100);border-radius:100px;margin-bottom:10px;overflow:hidden}
.topic-prog-fill{height:100%;border-radius:100px;background:var(--teal);transition:width .3s}
.topic-status{width:100%;margin-bottom:8px;padding:5px 7px;border:1px solid var(--g200);border-radius:4px;font-size:.78rem;background:#fff;font-family:inherit}
.topic-notes-ta{width:100%;padding:6px 9px;border:1px solid var(--g200);border-radius:4px;font-size:.78rem;resize:vertical;min-height:56px;font-family:inherit}
.topic-notes-ta:focus{outline:none;border-color:var(--teal)}
/* LEARN */
.learn-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;min-height:600px}
@media(max-width:800px){.learn-layout{grid-template-columns:1fr}}
.learn-topic-list{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);overflow:hidden;align-self:start;position:sticky;top:160px;max-height:calc(100vh - 200px);overflow-y:auto}
.learn-topic-list-title{padding:12px 14px;font-size:.8rem;font-weight:700;color:var(--navy);background:var(--g50);border-bottom:1px solid var(--g200)}
.learn-topic-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--g100);transition:background .1s;font-size:.82rem;color:var(--g800)}
.learn-topic-item:hover{background:var(--g50)}.learn-topic-item.active{background:#eff6ff;color:var(--navy);font-weight:600}
.learn-topic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.learn-topic-conf{font-size:.7rem;color:var(--g400);margin-left:auto}
.learn-content{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200)}
.learn-content-hd{padding:16px 20px;border-bottom:1px solid var(--g200)}
.learn-content-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.learn-tabs{display:flex;gap:0;border-bottom:2px solid var(--g200)}
.learn-tab{padding:8px 18px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:500;color:var(--g600);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.learn-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.learn-tab-panel{display:none;padding:20px}.learn-tab-panel.active{display:block}
/* Notes */
.notes-section{margin-bottom:18px}
.notes-heading{font-size:.85rem;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--g100)}
.notes-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.notes-list li{font-size:.83rem;line-height:1.5;color:var(--g800);padding-left:14px;position:relative}
.notes-list li::before{content:"▸";position:absolute;left:0;color:var(--teal);font-size:.75rem;top:2px}
.notes-ref{display:inline-block;margin-top:2px;font-size:.7rem;color:var(--g400);font-style:italic}
.notes-source-badge{display:inline-block;background:#dbeafe;color:#1e40af;font-size:.65rem;padding:1px 6px;border-radius:100px;font-weight:600;margin-bottom:10px}
/* Flashcards */
.card-counter{text-align:center;font-size:.78rem;color:var(--g400);margin-bottom:16px}
.card-wrapper{perspective:800px;margin-bottom:16px}
.flip-card{width:100%;min-height:180px;position:relative;transform-style:preserve-3d;transition:transform .45s;cursor:pointer;border-radius:var(--r)}
.flip-card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.card-front{background:linear-gradient(135deg,var(--navy) 0%,#2d5a8e 100%);color:#fff}
.card-back{background:linear-gradient(135deg,#065f46 0%,#059669 100%);color:#fff;transform:rotateY(180deg)}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:10px}
.card-text{font-size:.95rem;line-height:1.5;font-weight:500}
.card-ref{font-size:.7rem;opacity:.6;margin-top:10px}
.card-hint{text-align:center;font-size:.75rem;color:var(--g400);margin-bottom:16px}
.card-judge{display:flex;justify-content:center;gap:12px;margin-bottom:12px;display:none}
.card-judge.show{display:flex}
.btn-got-it{background:#059669;color:#fff;padding:8px 20px;border:none;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
.btn-missed{background:#dc2626;color:#fff;padding:8px 20px;border:none;border-radius:var(--r);cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
.btn-got-it:hover,.btn-missed:hover{opacity:.85}
.card-nav{display:flex;justify-content:center;gap:12px}
.card-mastery{display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:8px;font-size:.7rem}
.cm-dot{width:8px;height:8px;border-radius:50%}
.cm-unseen{background:var(--g200)}.cm-learning{background:#f59e0b}.cm-mastered{background:#059669}
.topic-mastery-bar{display:flex;gap:2px;margin-top:4px}
.tmb-seg{height:3px;border-radius:2px;flex:1}
.tmb-unseen{background:var(--g200)}.tmb-learning{background:#f59e0b}.tmb-mastered{background:#059669}
/* Progress summary */
.prog-summary{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);padding:16px;margin-bottom:16px}
.prog-summary-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.prog-summary-title{font-size:.9rem;font-weight:700;color:var(--navy)}
.prog-overview{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.prog-stat{text-align:center}
.prog-stat-val{font-size:1.6rem;font-weight:700;line-height:1}
.prog-stat-lbl{font-size:.68rem;color:var(--g400);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.prog-bar{height:10px;background:var(--g100);border-radius:100px;overflow:hidden;display:flex;margin-bottom:14px}
.prog-bar-mastered{background:#059669;transition:width .3s}.prog-bar-learning{background:#f59e0b;transition:width .3s}
.prog-topic-rows{display:flex;flex-direction:column;gap:6px}
.prog-topic-row{display:flex;align-items:center;gap:10px;font-size:.78rem}
.prog-topic-name{flex:1;color:var(--g800);font-weight:500}
.prog-topic-bar{width:120px;height:6px;background:var(--g100);border-radius:100px;overflow:hidden;display:flex;flex-shrink:0}
.prog-topic-nums{font-size:.7rem;color:var(--g400);width:50px;text-align:right;flex-shrink:0}
.btn-reset{background:none;border:1px solid var(--g200);border-radius:4px;padding:4px 10px;font-size:.72rem;color:var(--g400);cursor:pointer;transition:all .15s}
.btn-reset:hover{border-color:var(--red);color:var(--red)}
/* Quiz */
.quiz-start{text-align:center;padding:40px 20px}
.quiz-start h3{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.quiz-start p{font-size:.85rem;color:var(--g600);margin-bottom:20px}
.quiz-q-num{font-size:.78rem;color:var(--g400);margin-bottom:8px}
.quiz-stem{font-size:.9rem;line-height:1.6;color:var(--g800);margin-bottom:16px;font-weight:500}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.quiz-opt{padding:10px 14px;border:1.5px solid var(--g200);border-radius:var(--r);cursor:pointer;font-size:.85rem;text-align:left;background:#fff;transition:all .15s;line-height:1.4}
.quiz-opt:hover:not(.answered){border-color:var(--navy);background:#eff6ff}
.quiz-opt.correct{border-color:var(--green);background:#f0fdf4;color:#065f46;font-weight:600}
.quiz-opt.wrong{border-color:var(--red);background:#fef2f2;color:#991b1b}
.quiz-opt.reveal-correct{border-color:var(--green);background:#f0fdf4;color:#065f46}
.quiz-opt.answered{cursor:default}
.quiz-exp{background:var(--g50);border-radius:var(--r);padding:14px;font-size:.82rem;line-height:1.6;color:var(--g800);border-left:3px solid var(--teal);margin-bottom:14px;display:none}
.quiz-exp.show{display:block}
.quiz-verdict{text-align:center;font-size:.95rem;font-weight:700;padding:10px;border-radius:var(--r);margin-bottom:10px;display:none}
.quiz-verdict.verdict-correct{display:block;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.quiz-verdict.verdict-wrong{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.quiz-exp-ref{font-size:.72rem;color:var(--g400);margin-top:6px;font-style:italic}
.quiz-score-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-size:.82rem}
.score-pill{padding:3px 10px;border-radius:100px;font-weight:700;font-size:.78rem}
.score-correct{background:#d1fae5;color:#065f46}.score-wrong{background:#fee2e2;color:#991b1b}
.quiz-result{text-align:center;padding:30px}
.quiz-result-score{font-size:2.5rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.quiz-result-msg{font-size:.9rem;color:var(--g600);margin-bottom:20px}
/* CALENDAR */
.cal-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
@media(max-width:900px){.cal-layout{grid-template-columns:1fr}}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{background:#fff;border:1px solid var(--g200);border-radius:4px;padding:5px 12px;cursor:pointer;font-size:.88rem}.cal-nav:hover{background:var(--g50)}
.cal-my{font-size:1.05rem;font-weight:700;color:var(--navy)}
.cal-grid{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);overflow:hidden}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy)}
.cal-wday{text-align:center;padding:7px 4px;font-size:.7rem;font-weight:600;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.05em}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:75px;border-right:1px solid var(--g100);border-bottom:1px solid var(--g100);padding:5px;cursor:pointer;transition:background .1s;position:relative}
.cal-day:nth-child(7n){border-right:none}.cal-day:hover{background:var(--g50)}.cal-day.other{opacity:.4;background:#fafafa}.cal-day.today{background:#eff6ff}.cal-day.has-log{background:#f0fdf4}
.cal-day-num{font-size:.78rem;font-weight:600;margin-bottom:3px;line-height:1}
.cal-day.today .cal-day-num{background:var(--navy);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px}.cal-dot{width:7px;height:7px;border-radius:50%}
.cal-goal-tag{position:absolute;bottom:3px;right:3px;left:3px;font-size:.62rem;background:var(--amber);color:#fff;padding:1px 4px;border-radius:3px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-dur{font-size:.68rem;color:var(--green);font-weight:600}
.heatmap-wrap{margin-top:18px;background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh);border:1px solid var(--g200)}
.heatmap-title{font-size:.82rem;font-weight:600;color:var(--g800);margin-bottom:10px}
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap}
.hm-cell{width:11px;height:11px;border-radius:2px;background:var(--g100)}
.hm-1{background:#bbf7d0}.hm-2{background:#4ade80}.hm-3{background:#16a34a}.hm-4{background:#14532d}
.heatmap-legend{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:.7rem;color:var(--g400)}
.hm-leg{width:11px;height:11px;border-radius:2px}
.sidebar-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);margin-bottom:14px;overflow:hidden}
.sidebar-title{padding:11px 14px;font-size:.82rem;font-weight:700;color:var(--navy);background:var(--g50);border-bottom:1px solid var(--g200)}
.sidebar-body{padding:14px}
.goals-list{display:flex;flex-direction:column;gap:7px}
.goal-item{display:flex;align-items:flex-start;gap:7px;padding:7px;border-radius:4px;border:1px solid var(--g200);font-size:.78rem}
.goal-item.done{opacity:.45}.goal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:2px}
.goal-body{flex:1}.goal-ttl{font-weight:600;color:var(--g800)}.goal-due{color:var(--g400);font-size:.72rem}.goal-due.late{color:var(--red);font-weight:600}
.goal-actions{display:flex;gap:4px;flex-shrink:0}
.goal-btn{cursor:pointer;color:var(--g400);font-size:.85rem;border:none;background:none;padding:1px 3px}.goal-btn:hover{color:var(--navy)}.goal-btn.del:hover{color:var(--red)}
.add-goal-form{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.add-goal-form input,.add-goal-form select{padding:6px 9px;border:1px solid var(--g200);border-radius:4px;font-size:.78rem;font-family:inherit;width:100%}
.color-row{display:flex;gap:6px;align-items:center;font-size:.78rem;color:var(--g600)}
.color-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}.color-swatch.sel{border-color:var(--g800)}
/* Recall Bank */
.recall-accordion{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);margin-bottom:8px;overflow:hidden}
.recall-acc-hd{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;user-select:none;transition:background .1s}
.recall-acc-hd:hover{background:var(--g50)}
.recall-acc-hd .acc-arrow{font-size:.7rem;color:var(--g400);transition:transform .2s;flex-shrink:0;width:14px}
.recall-acc-hd.open .acc-arrow{transform:rotate(90deg)}
.recall-acc-hd .acc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.recall-acc-hd .acc-name{font-size:.85rem;font-weight:600;color:var(--navy)}
.recall-acc-hd .acc-count{font-size:.72rem;color:var(--g400);margin-left:auto;font-weight:400}
.recall-acc-body{display:none;border-top:1px solid var(--g100)}
.recall-acc-body.open{display:block}
.recall-q{padding:8px 15px 8px 39px;border-bottom:1px solid var(--g100);font-size:.82rem;line-height:1.55;color:var(--g800);position:relative}
.recall-q:last-child{border-bottom:none}
.recall-q .rq-src{display:inline;font-size:.68rem;color:var(--g400);margin-left:6px;font-weight:400}
/* Shared */
.btn{padding:7px 15px;border:none;border-radius:4px;cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s;font-family:inherit}.btn:hover{opacity:.85}
.btn-primary{background:var(--navy);color:#fff}.btn-teal{background:var(--teal);color:#fff}.btn-sm{padding:4px 10px;font-size:.75rem}.btn-secondary{background:var(--g100);color:var(--g800)}
.empty{text-align:center;padding:40px;color:var(--g400);font-size:.88rem}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r);box-shadow:0 20px 40px rgba(0,0,0,.2);padding:22px;width:92%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-sec-title{font-size:.75rem;font-weight:600;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 7px}
.modal-checklist{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto;border:1px solid var(--g200);border-radius:4px;padding:9px}
.modal-ci{display:flex;align-items:center;gap:7px;font-size:.8rem}.modal-ci input{cursor:pointer}
.dur-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.82rem}
.dur-row input{width:70px;padding:5px 8px;border:1px solid var(--g200);border-radius:4px;font-size:.88rem}
.modal-notes-ta{width:100%;padding:7px 9px;border:1px solid var(--g200);border-radius:4px;font-size:.82rem;font-family:inherit;resize:vertical;min-height:65px;margin-top:8px}
.modal-footer{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
@media(max-width:600px){.sources-grid,.topics-grid{grid-template-columns:1fr}.hdr-stats{gap:12px}.stat-val{font-size:1.05rem}main{padding:14px}.learn-layout{grid-template-columns:1fr}}

<script>
// ── FIREBASE / AUTH ────────────────────────────────────────────────────────
const FB_USERS={"korky":"korkyblorky"};
let currentUser=null,db=null,fsTimer=null;
firebase.initializeApp({apiKey:"AIzaSyBlXzIz_Yjs55dumuZRCZ_UkDQRkZ24wvY",authDomain:"frcs-revision.firebaseapp.com",projectId:"frcs-revision",storageBucket:"frcs-revision.firebasestorage.app",messagingSenderId:"854181681754",appId:"1:854181681754:web:2bbb99b152d2e8cb74d663"});
db=firebase.firestore();
function doLogin(){
  const u=document.getElementById("login-user").value.trim().toLowerCase();
  const p=document.getElementById("login-pass").value;
  if(FB_USERS[u]!==p){document.getElementById("login-err").textContent="Incorrect username or password.";return;}
  currentUser=u;localStorage.setItem("frcs_user",u);
  document.getElementById("login-overlay").style.display="none";
  const hdrEl=document.getElementById("hdr-user");if(hdrEl)hdrEl.textContent=u;
  loadState();renderQuizTopicCheckboxes();renderLearnTopicList();updateStats();
  loadFromFirestore();
}
function doLogout(){
  if(!confirm("Sign out?"))return;
  localStorage.removeItem("frcs_user");currentUser=null;location.reload();
}
async function loadFromFirestore(){
  if(!currentUser||!db)return;
  try{
    const snap=await db.collection("users").doc(currentUser).get();
    if(snap.exists){
      const d=snap.data();
      state={...state,...d};
      normalizeState();
      localStorage.setItem("frcs_state",JSON.stringify(state));
      renderQuizTopicCheckboxes();renderLearnTopicList();updateStats();
      if(currentLearnTopic){const t=TOPICS.find(x=>x.id===currentLearnTopic);const ld=LEARN[currentLearnTopic];if(t&&ld)renderLearnContent(t,ld);}
    }
  }catch(e){console.error("Firestore load failed:",e);}
}
function saveToFirestore(){
  if(!currentUser||!db)return;
  clearTimeout(fsTimer);
  fsTimer=setTimeout(async()=>{try{await db.collection("users").doc(currentUser).set(state);}catch(e){console.error("Firestore save failed:",e);}},2000);
}
// ── TOPIC COLOURS ──────────────────────────────────────────────────────────
const TCOL={"cranial-anatomy":"#0891b2","spinal-anatomy":"#0d9488","neuropathology":"#7c3aed","neuroradiology":"#1e40af","neuro-onco-cranial":"#dc2626","neuro-onco-spinal":"#b91c1c","vascular-aneurysm":"#9f1239","vascular-avm":"#be185d","vascular-ich":"#c2410c","carotid":"#b45309","head-injury":"#0369a1","spinal-trauma":"#0e7490","degenerative-spine":"#0f766e","hydrocephalus":"#4338ca","epilepsy-surgery":"#6d28d9","functional":"#7e22ce","pituitary":"#be123c","peripheral-nerve":"#047857","paeds":"#065f46","neuro-icu":"#1d4ed8","neurophysiology":"#5b21b6","ethics":"#374151"};
const CLBLS=["","Not started","Basic awareness","Working knowledge","Confident","Exam ready"];
// Recall bank frequency per topic (computed from data)
const RECALL_COUNTS=(()=>{const c={};RECALL.forEach(r=>{c[r.topic]=(c[r.topic]||0)+1;});return c;})();
function recallBadge(topicId){const n=RECALL_COUNTS[topicId]||0;if(!n)return'';const col=n>=40?'#dc2626':n>=20?'#d97706':n>=10?'#2563eb':'#6b7280';return`<span style="font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:100px;background:${col}18;color:${col};border:1px solid ${col}40;white-space:nowrap">${n} recalls</span>`;}

// ── STATE ──────────────────────────────────────────────────────────────────
let state={sources:{},topics:{},log:{},goals:[],examDate:"",cards:{},sbaResults:{}};
function normalizeState(){
  if(!state.sources)state.sources={};if(!state.topics)state.topics={};
  if(!state.cards)state.cards={};if(!state.sbaResults)state.sbaResults={};
  if(!state.log)state.log={};if(!state.goals)state.goals=[];
  SOURCES.forEach(s=>{if(!state.sources[s.id])state.sources[s.id]={enabled:true,status:"not-started"};});
  TOPICS.forEach(t=>{if(!state.topics[t.id])state.topics[t.id]={confidence:0,status:"not-started",notes:""};});
}
function loadState(){try{const s=localStorage.getItem("frcs_state");if(s)state={...state,...JSON.parse(s)};}catch(e){}normalizeState();}
// Card ID: stable hash from question text
function cardId(topicId,q){return topicId+"::"+q.substring(0,60).replace(/[^a-zA-Z0-9]/g,"_");}
function sbaId(topicId,stem){return "sba::"+topicId+"::"+stem.substring(0,60).replace(/[^a-zA-Z0-9]/g,"_");}
function getCardState(id){return state.cards[id]||{seen:0,correct:0,lastSeen:0};}
function recordCard(id,correct){
  const c=getCardState(id);
  c.seen++;if(correct)c.correct++;c.lastSeen=Date.now();
  state.cards[id]=c;save();
}
let qStartTime=0;
function recordSba(id,correct,ms){
  const s=state.sbaResults[id]||{seen:0,correct:0,totalMs:0};
  s.seen++;if(correct)s.correct++;if(ms)s.totalMs=(s.totalMs||0)+ms;
  state.sbaResults[id]=s;save();
}
// Card mastery: 0=unseen, 1=learning (seen but <70% correct), 2=mastered (≥3 seen, ≥70% correct)
function cardMastery(id){
  const c=getCardState(id);
  if(!c.seen)return 0;
  if(c.seen>=3&&c.correct/c.seen>=0.7)return 2;
  return 1;
}
// Sort cards: wrong/unseen first, mastered last. Within each group, least recently seen first.
function smartSortCards(cards,topicId){
  return [...cards].sort((a,b)=>{
    const ma=cardMastery(cardId(topicId,a.q)),mb=cardMastery(cardId(topicId,b.q));
    if(ma!==mb)return ma-mb;
    const la=getCardState(cardId(topicId,a.q)).lastSeen,lb=getCardState(cardId(topicId,b.q)).lastSeen;
    return la-lb;
  });
}
function topicCardStats(topicId){
  const ld=LEARN[topicId];if(!ld)return{total:0,unseen:0,learning:0,mastered:0};
  const cards=filteredCards(ld);
  let unseen=0,learning=0,mastered=0;
  cards.forEach(c=>{const m=cardMastery(cardId(topicId,c.q));if(m===0)unseen++;else if(m===1)learning++;else mastered++;});
  return{total:cards.length,unseen,learning,mastered};
}
function topicSbaStats(topicId){
  const ld=LEARN[topicId];if(!ld||!ld.q)return{seen:0,correct:0,pct:0,avgMs:0};
  let seen=0,correct=0,totalMs=0;
  ld.q.forEach(q=>{const sid=sbaId(topicId,q.stem);const s=state.sbaResults[sid];if(s){seen+=s.seen;correct+=s.correct;totalMs+=(s.totalMs||0);}});
  return{seen,correct,pct:seen?Math.round(correct/seen*100):0,avgMs:seen?Math.round(totalMs/seen):0};
}
function save(){localStorage.setItem("frcs_state",JSON.stringify(state));saveToFirestore();}
// ── STATS ──────────────────────────────────────────────────────────────────
function updateStats(){
  // Card mastery stats
  let totalCards=0,masteredCards=0,learningCards=0;
  TOPICS.forEach(t=>{const st=topicCardStats(t.id);totalCards+=st.total;masteredCards+=st.mastered;learningCards+=st.learning;});
  document.getElementById("stat-mastered").textContent=masteredCards;
  document.getElementById("stat-learning").textContent=learningCards;
  document.getElementById("stat-total").textContent=totalCards;
  document.getElementById("stat-streak").textContent=calcStreak();
  const pct=totalCards?Math.round(masteredCards/totalCards*100):0;
  document.getElementById("overall-fill").style.width=pct+"%";
  if(state.examDate){const t=new Date();t.setHours(0,0,0,0);const d=Math.ceil((new Date(state.examDate)-t)/86400000);document.getElementById("stat-days").textContent=d>0?d:"—";document.getElementById("exam-date-label").textContent=d>0?"("+formatDate(state.examDate)+")":"Exam date passed";}}
function calcStreak(){let s=0;const t=new Date();t.setHours(0,0,0,0);let d=new Date(t);for(;;){const k=toKey(d);if(state.log[k])s++;else if(d.getTime()===t.getTime()){d.setDate(d.getDate()-1);continue;}else break;d.setDate(d.getDate()-1);}return s;}
// ── TABS ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(b=>{b.addEventListener("click",()=>{
  document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");document.getElementById("tab-"+b.dataset.tab).classList.add("active");
  if(b.dataset.tab==="quiz"){renderLearnTopicList();}
  if(b.dataset.tab==="progress"){renderProgressSummary();}
  if(b.dataset.tab==="sources"){renderSourcesTable();}
});});
// ── PDF MODAL ──────────────────────────────────────────────────────────────
function openPDF(path,name){document.getElementById("pdf-modal-title").textContent=name;document.getElementById("pdf-iframe").src=path;document.getElementById("pdf-modal").classList.add("open");}
document.getElementById("pdf-modal").addEventListener("click",e=>{if(e.target===e.currentTarget){e.currentTarget.classList.remove("open");document.getElementById("pdf-iframe").src="";}});
function setSrcStatus(id,v,sel){state.sources[id].status=v;const sc=v==="in-progress"?" s-ip":v==="done"?" s-done":"";sel.className="status-sel"+sc;save();}
// ── PROGRESS TAB ──────────────────────────────────────────────────────────
function topicAutoScore(topicId){
  const cSt=topicCardStats(topicId);
  const sSt=topicSbaStats(topicId);
  const cPct=cSt.total?Math.round(cSt.mastered/cSt.total*100):null;
  const sPct=sSt.seen?sSt.pct:null;
  if(cPct!==null&&sPct!==null)return Math.round((cPct+sPct)/2);
  if(cPct!==null)return cPct;
  if(sPct!==null)return sPct;
  return null;
}
function scoreCol(s){return s===null?"#9ca3af":s>=70?"#059669":s>=40?"#d97706":"#dc2626";}
function renderSourcesTable(){
  const wrap=document.getElementById("sources-table-wrap");if(!wrap)return;
  const priStyle={essential:'background:#fee2e2;color:#991b1b',recommended:'background:#fef3c7;color:#92400e',supplementary:'background:var(--g100);color:var(--g600)',korky:'background:#fef08a;color:#713f12'};
  const catOrder=["Official Exam","E-Learning","Clinical Guidelines","Textbooks","Neuroradiology","Neuroanatomy","Revision Courses","Korky — Key Papers","Korky — Aberdeen Course"];
  const grouped={};
  SOURCES.forEach(s=>{const c=s.category||"Other";if(!grouped[c])grouped[c]=[];grouped[c].push(s);});
  const cats=[...catOrder.filter(c=>grouped[c]),...Object.keys(grouped).filter(c=>!catOrder.includes(c)&&grouped[c])];
  const intro=`<div style="background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--g200);padding:20px 22px;margin-bottom:22px;font-size:.84rem;line-height:1.75;color:var(--g800)">
    <div style="font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:10px">About this revision tool</div>
    <p>Built from the exam materials assembled by Korky for the FRCS (SN). Content comes from two streams: <strong>verified clinical guidelines</strong> (NICE, RCP, Society for Endocrinology — freely available PDFs stored in this app) and <strong>landmark papers and course notes</strong> from Korky's past-candidate folder.</p>
    <p style="margin-top:8px">Cards and SBAs are weighted toward the topics with the highest <em>recall-bank frequency</em> — the themes that real candidates report testing most often. Neuro-oncology cranial, degenerative spine, and vascular aneurysm are the highest-priority areas. The "Exam-likely" deck filter surfaces only cards and questions directly inspired by recall-bank patterns. Every card carries a source reference and page number; the reference is the authority, not the card text.</p>
  </div>`;
  let html=intro;
  cats.forEach(cat=>{
    const srcs=grouped[cat];
    const isKorky=cat.startsWith("Korky")||cat==="Textbooks";
    const catLabel=cat.replace("Korky — ","");
    html+=`<div style="margin-bottom:24px">
      <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${isKorky?"#92400e":"var(--navy)"};margin-bottom:8px;display:flex;align-items:center;gap:8px">
        ${isKorky?`<span style="background:#fef08a;color:#713f12;border:1px solid #eab308;padding:1px 8px;border-radius:100px;font-size:.68rem">Korky folder</span>`:""}
        ${catLabel}
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:.8rem;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--g200)">
      <thead><tr style="background:var(--g50);border-bottom:2px solid var(--g200)">
        <th style="text-align:left;padding:8px 12px;font-weight:600;color:var(--navy)">Source</th>

  document.getElementById("tq-exp").classList.add("show");

    const qs=filteredQs(LEARN[t.id].q);
    if(!qs.length)return"";
    return`<label style="display:flex;align-items:center;gap:6px;font-size:.8rem;cursor:pointer"><input type="checkbox" ${quizTopics.has(t.id)?"checked":""} onchange="toggleQuizTopic('${t.id}',this.checked)"><span>${t.name}</span><span style="font-size:.7rem;color:var(--g400)">(${qs.length})</span></label>`;
  });
  document.getElementById("quiz-topic-checkboxes").innerHTML=visible.join("");
}
function toggleQuizTopic(id,v){if(v)quizTopics.add(id);else quizTopics.delete(id);}
function selectAllQuizTopics(v){quizTopics=v?new Set(TOPICS.map(t=>t.id)):new Set();renderQuizTopicCheckboxes();}
function startQuiz(){
  let pool=[];TOPICS.forEach(t=>{if(quizTopics.has(t.id)&&LEARN[t.id]){const qs=filteredQs(LEARN[t.id].q);pool=[...pool,...qs];}});
  if(!pool.length){alert("No questions available. Select at least one topic with quiz content.");return;}
  quizState={qs:pool.sort(()=>Math.random()-.5),idx:0,correct:0,answered:false};
  document.getElementById("quiz-topic-select").style.display="none";
  document.getElementById("quiz-area").style.display="block";
  renderGQ();
}
function renderGQ(){
  const el=document.getElementById("quiz-area");
  if(quizState.idx>=quizState.qs.length){
    const pct=Math.round(quizState.correct/quizState.qs.length*100);
    el.innerHTML=`<div class="quiz-result"><div class="quiz-result-score">${quizState.correct}/${quizState.qs.length}</div><div class="quiz-result-msg">${pct>=80?"Excellent work!":pct>=60?"Good — keep reviewing.":"Go over the notes and try again."}</div><button class="btn btn-primary" onclick="restartGQ()">New Quiz</button></div>`;return;
  }
  const q=quizState.qs[quizState.idx];
  el.innerHTML=`<div class="quiz-score-bar">Question ${quizState.idx+1} of ${quizState.qs.length} &nbsp; <span class="score-pill score-correct">${quizState.correct} ✓</span> <span class="score-pill score-wrong">${quizState.idx-quizState.correct} ✗</span></div>
  <div class="quiz-stem">${q.stem}</div>
  <div class="quiz-opts">${q.opts.map((o,i)=>`<button class="quiz-opt" id="gqo-${i}" onclick="answerGQ(${i})">${o}</button>`).join("")}</div>
  <div class="quiz-verdict" id="gq-verdict"></div>
  <div class="quiz-exp" id="gq-exp">${q.exp}${sbaSourceHtml(q)}</div>
  <div style="text-align:right;margin-top:4px"><button class="btn btn-primary btn-sm" id="gq-next" style="display:none" onclick="nextGQ()">Next →</button></div>`;
  qStartTime=Date.now();
}
function answerGQ(i){
  if(quizState.answered)return;quizState.answered=true;
  const ms=qStartTime?Date.now()-qStartTime:0;
  const q=quizState.qs[quizState.idx];
  const correct=i===q.ans;
  document.querySelectorAll(".quiz-opt").forEach((o,j)=>{o.classList.add("answered");if(j===q.ans)o.classList.add(correct&&j===i?"correct":"reveal-correct");else if(j===i)o.classList.add("wrong");});
  const v=document.getElementById("gq-verdict");
  if(v){v.className="quiz-verdict "+(correct?"verdict-correct":"verdict-wrong");v.textContent=correct?"Correct!":"Wrong — see explanation below";}
  document.getElementById("gq-exp").classList.add("show");
  document.getElementById("gq-next").style.display="inline-block";
  if(correct)quizState.correct++;
  const scoreEl=document.querySelector(".quiz-score-bar");
  if(scoreEl){const w=quizState.idx+1-quizState.correct;scoreEl.innerHTML=`Question ${quizState.idx+1} of ${quizState.qs.length} &nbsp; <span class="score-pill score-correct">${quizState.correct} ✓</span> <span class="score-pill score-wrong">${w} ✗</span>`;}
  if(q.stem){for(const tid of Object.keys(LEARN)){const qs=LEARN[tid].q;if(qs.some(x=>x.stem===q.stem)){recordSba(sbaId(tid,q.stem),correct,ms);break;}}}
}
function nextGQ(){quizState.idx++;quizState.answered=false;renderGQ();}
function restartGQ(){document.getElementById("quiz-topic-select").style.display="block";document.getElementById("quiz-area").style.display="none";renderQuizTopicCheckboxes();showGlobalQuiz();}
function toKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function formatDate(k){if(!k)return"";const[y,m,d]=k.split("-");const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return`${parseInt(d)} ${mo[parseInt(m)-1]} ${y}`;}
// ── EXAM DATE ──────────────────────────────────────────────────────────────
const examInp=document.getElementById("exam-date-input");
if(state.examDate)examInp.value=state.examDate;
examInp.addEventListener("change",()=>{state.examDate=examInp.value;save();updateStats();});
// ── INIT ───────────────────────────────────────────────────────────────────
(function(){
  const savedUser=localStorage.getItem("frcs_user");
  if(savedUser){
    currentUser=savedUser;
    const hdrEl=document.getElementById("hdr-user");if(hdrEl)hdrEl.textContent=savedUser;
    document.getElementById("login-overlay").style.display="none";
    loadState();renderQuizTopicCheckboxes();renderLearnTopicList();updateStats();
    loadFromFirestore();
  }
  // else: login overlay stays visible
})();
</script>
</body>
